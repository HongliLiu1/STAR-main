_BASE: ../OTAM_base.yaml
TASK_TYPE: few_shot_action
TRAIN:
  ENABLE: true
  USE_CLASSIFICATION: true
  USE_CLASSIFICATION_VALUE: 1.5
  DATASET_FEW: HMDB_few_shot
  DATASET: Ssv2_few_shot
  META_BATCH: true  # meta or not
  NUM_SAMPLES: 1000000
  MAMBA_DEPTH : 4
  WAY: 2
  SHOT: 1
  QUERY_PER_CLASS: 2
  QUERY_PER_CLASS_TEST: 1
  NUM_TRAIN_TASKS: 10000
  NUM_TEST_TASKS: 3000
  VAL_FRE_ITER: 100
  BATCH_SIZE: 1
  CLASS_NAME: ['brush hair', 'catch', 'chew', 'clap', 'climb', 'climb stairs', 'dive', 'draw_sword', 'dribble', 'drink', 'fall floor', 'flic flac', 'handstand', 'hug', 'jump', 'kiss', 'pullup', 'punch', 'push', 'ride_bike', 'ride horse', 'shake_hands', 'shoot_bow', 'situp', 'stand', 'sword', 'sword exercise', 'throw', 'turn', 'walk', 'wave']
  BATCH_SIZE_PER_TASK: 1
  CORPUS_LIST: [
    'Brushing hair to smooth or style it',
    'Catching an object in the air',
    'Chewing food with teeth',
    'Clapping hands together to make a sound',
    'Climbing a surface using hands and feet',
    'Walking up steps',
    'Diving headfirst into water or air',
    'Drawing a sword from a scabbard',
    'Controlling a ball while in motion',
    'Drinking liquid using a cup or straw',
    'Falling unexpectedly to the ground',
    'Performing a split jump with legs kicked apart',
    'Balancing the body vertically on hands',
    'Wrapping arms around someone in an embrace',
    'Jumping off the ground into the air',
    'Touching lips briefly to another person',
    'Pulling the body up using a bar',
    'Hitting with a clenched fist',
    'Pushing something away with force',
    'Riding a bicycle',
    'Riding and controlling a horse',
    'Shaking another person’s hand',
    'Shooting an arrow with a bow',
    'Lifting the upper body while lying face-up',
    'Standing upright from a lower position',
    'Wielding or handling a sword',
    'Practicing sword movements',
    'Throwing an object through the air',
    'Turning the body around',
    'Walking at a regular pace',
    'Waving a hand to greet or signal someone']
  CHECKPOINT_FILE_PATH: ""
  EVAL_PERIOD: 2
  NUM_FOLDS: 1

AUGMENTATION:
  COLOR_AUG: false
  NO_RANDOM_ERASE: true

TEST:
  ENABLE: false
  DATASET: Ssv2_few_shot
  BATCH_SIZE: 1
  TEST_SET: val
  CLASS_NAME: ['fencing', 'kick', 'kick ball', 'pick', 'pour', 'pushup', 'run', 'sit', 'smoke', 'talk']
  CORPUS_LIST: [
    'Using swords to engage in a combat sport with precise movements',
    'Striking with the foot or leg',
    'Propelling a ball with a kick',
    'Selecting or choosing something',
    'Transferring liquid from one container to another',
    'Performing an exercise by lowering and raising the body using arms',
    'Moving at a fast pace using alternating foot movements',
    'Assuming a seated position on a surface',
    'Exhaling smoke from a cigarette or other smoking device',
    'Communicating verbally with others']
  NUM_ENSEMBLE_VIEWS: 1
  SPATIAL_CROPS: cctltr
  AUTOMATIC_MULTI_SCALE_TEST: false
  UPLOAD_CLASSIFIER_RESULTS: true

DATA:
  DATA_ROOT_DIR: /mnt/disk17/liuhongli/downdatas/hmdb51/
  ANNO_DIR: ./configs/projects/CLIPFSAR/hmdb51/
  NUM_INPUT_FRAMES: 8
  SAMPLING_RATE: 50
  # SAMPLING_RATE_TRAIN: 3
  SAMPLING_UNIFORM: false
  TRAIN_JITTER_SCALES: [256, 256]
  MEAN: [0.48145466, 0.4578275, 0.40821073]
  STD: [0.26862954, 0.26130258, 0.27577711]
  TRAIN_CROP_SIZE: 224 # 84  # 224
  TEST_CROP_SIZE: 224
  TEST_SCALE: 256
  TEST_CENTER_CROP: true
  CLIP_INTERVAL: 8
  FPS: 12
  TARGET_FPS: 12


LOG_PERIOD: 50
SOLVER:
  BASE_LR: 1e-04   # 0.0001 # 0.0005 0.00001
  LR_POLICY: steps_with_relative_lrs
  STEPS_ITER: 600
  STEPS: [0, 4, 6]
  LRS: [1, 0.1, 0.01]
  MAX_EPOCH: 10
  MOMENTUM: 0.9
  WEIGHT_DECAY: 3e-4
  WARMUP_EPOCHS: 1
  WARMUP_START_LR: 1e-05
  OPTIM_METHOD: adam
  DAMPENING: 0.0
  NESTEROV: true
# add bn, use same lr settings as server

VIDEO:
  HEAD:
    NAME: CNN_OTAM_CLIPFSAR  
    BACKBONE_NAME: "RN50"
    
  BACKBONE:
    META_ARCH: Identity

NUM_GPUS: 1
OUTPUT_DIR: output/CLIPFSAR_HMDB51_1shot
